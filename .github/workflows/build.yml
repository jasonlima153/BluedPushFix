name: Build Memory-Audio PushFix Dylib

on: [push, pull_request]

jobs:
  build:
    runs-on: macos-14
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Install Theos Environment
      run: |
        git clone --recursive https://github.com/theos/theos.git $HOME/theos
        echo "THEOS=$HOME/theos" >> $GITHUB_ENV

    # 使用 ProcursusTeam/ldid 仓库（theos/ldid 已不存在），安装依赖后现场编译
    - name: Compile and Setup Ldid from Source
      run: |
        brew install libplist
        git clone --depth=1 https://github.com/ProcursusTeam/ldid.git $HOME/ldid-src
        cd $HOME/ldid-src
        make -j$(sysctl -n hw.ncpu)
        cp ldid $HOME/theos/bin/
        chmod +x $HOME/theos/bin/ldid
        echo "[Success] ldid compiled and installed"

    - name: Setup iOS SDK
      run: |
        rm -rf $HOME/theos/sdks
        git clone --depth=1 https://github.com/theos/sdks.git $HOME/theos/sdks
        
    - name: Convert MP3 to C Header Array
      run: |
        if [ -f "silent.mp3" ]; then
          xxd -i silent.mp3 silent_data.h
          echo "[Success] silent_data.h converted."
        else
          echo "[Error] silent.mp3 not found!"
          exit 1
        fi

    - name: Generate Flexible Filter Plist
      run: |
        cat <<EOF > BluedPushFix.plist
        {
            Filter = {
                Executables = (
                    "Blued极速版2",
                    "Blued",
                    "xiaolAn"
                );
            };
        }
        EOF
        
    - name: Compile Dylib via Theos
      run: |
        export THEOS=$HOME/theos
        make package FINALPACKAGE=1

    - name: Extract Dylib from Package
      run: |
        find .theos -name "BluedPushFix.dylib" -type f
        DYLIB_PATH=$(find .theos -name "BluedPushFix.dylib" -type f | head -1)
        if [ -n "$DYLIB_PATH" ]; then
          cp "$DYLIB_PATH" ./BluedPushFix.dylib
          echo "[Success] Dylib extracted from $DYLIB_PATH"
        else
          echo "[Warning] Dylib not found in .theos, extracting from deb..."
          dpkg-deb -x packages/*.deb extracted_pkg
          find extracted_pkg -name "BluedPushFix.dylib" -type f -exec cp {} ./BluedPushFix.dylib \;
        fi

    - name: Output Result Artifact
      uses: actions/upload-artifact@v4
      with:
        name: BluedPureMemoryPushFix
        path: |
          BluedPushFix.dylib
          packages/*.deb
