name: Build, Inject and Auto-Patch IPA

on: [push, pull_request]

jobs:
  build:
    runs-on: macos-14
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Prepare Theos and Environment
      run: |
        git clone --recursive https://github.com/theos/theos.git $HOME/theos
        echo "THEOS=$HOME/theos" >> $GITHUB_ENV
        brew install libplist
        git clone --depth=1 https://github.com/ProcursusTeam/ldid.git $HOME/ldid-src
        cd $HOME/ldid-src
        make -j$(sysctl -n hw.ncpu)
        cp ldid $HOME/theos/bin/
        chmod +x $HOME/theos/bin/ldid
        rm -rf $HOME/theos/sdks
        git clone --quiet --depth=1 https://github.com/theos/sdks.git $HOME/theos/sdks

    - name: Prepare Makefile and Plist
      run: |
        cat <<EOF > Makefile
        TARGET = iphone:clang:latest:10.0
        ARCHS = arm64
        include \$(THEOS)/makefiles/common.mk
        TWEAK_NAME = BluedPushFix
        BluedPushFix_FILES = Tweak.xm
        BluedPushFix_CFLAGS = -fobjc-arc
        BluedPushFix_FRAMEWORKS = UIKit AVFoundation UserNotifications AudioToolbox
        include \$(THEOS)/makefiles/tweak.mk
        EOF
        
        cat <<EOF > BluedPushFix.plist
        { Filter = { Executables = ( "Blued极速版2", "Blued", "xiaolAn" ); }; }
        EOF

    - name: Compile Dylib via Theos
      run: |
        export THEOS=$HOME/theos
        make package FINALPACKAGE=1

    - name: Extract Dylib Artifact
      run: |
        DYLIB_PATH=$(find .theos -name "BluedPushFix.dylib" -type f | head -1)
        if [ -n "$DYLIB_PATH" ]; then
          cp "$DYLIB_PATH" ./BluedPushFix.dylib
          echo "[Success] Dylib extracted from $DYLIB_PATH"
        else
          dpkg-deb -x packages/*.deb extracted_pkg
          find extracted_pkg -name "BluedPushFix.dylib" -type f -exec cp {} ./BluedPushFix.dylib \;
        fi

    - name: Auto-Inject and Patch Info.plist
      run: |
        if [ -f "app.ipa" ]; then
          echo "检测到 app.ipa，启动注入与权限纂改流水线..."
          curl -ksL https://github.com/alexzielenski/optool/releases/download/0.1/optool.zip -o optool.zip
          unzip -q optool.zip -d optool_dir
          chmod +x optool_dir/optool

          unzip -q app.ipa -d extracted_ipa/
          APP_DIR=$(ls -d extracted_ipa/Payload/*.app)
          EXECUTABLE_NAME=$(/usr/libexec/PlistBuddy -c "Print :CFBundleExecutable" "$APP_DIR/Info.plist")
          
          cp BluedPushFix.dylib "$APP_DIR/"
          ./optool_dir/optool install -c load -p "@executable_path/BluedPushFix.dylib" -t "$APP_DIR/$EXECUTABLE_NAME"

          PLIST_PATH="$APP_DIR/Info.plist"
          # 必须！为 App 烙印后台音频权限，防止 5 秒闪退强杀
          /usr/libexec/PlistBuddy -c "Add :UIBackgroundModes array" "$PLIST_PATH" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :UIBackgroundModes:0 string audio" "$PLIST_PATH" 2>/dev/null || true
          
          cd extracted_ipa
          zip -qr ../Blued_Final_Patched.ipa Payload/
          cd ..
        else
          echo "未检测到 app.ipa，将仅输出 dylib 文件。"
        fi

    - name: Output Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: Blued_Ultimate_Release
        path: |
          BluedPushFix.dylib
          Blued_Final_Patched.ipa
