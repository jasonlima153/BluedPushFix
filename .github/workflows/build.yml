name: Build Memory-Audio PushFix Dylib

on: [push, pull_request]

jobs:
  build:
    runs-on: macos-14
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Install Theos Environment
      run: |
        git clone --recursive https://github.com/theos/theos.git $HOME/theos
        echo "THEOS=$HOME/theos" >> $GITHUB_ENV

    # 核心修复：现场 clone 并直接编译 ldid 源码，彻底根除 404 网页假文件问题
    - name: Compile and Setup Ldid from Source
      run: |
        git clone https://github.com/theos/ldid.git $HOME/ldid-src
        cd $HOME/ldid-src
        make -j$(sysctl -n hw.ncpu)
        cp ldid $HOME/theos/bin/
        chmod +x $HOME/theos/bin/ldid
        echo "[Success] 现场编译的真实 ldid 二进制已成功注入 Theos 核心目录"

    - name: Setup iOS SDK
      run: |
        rm -rf $HOME/theos/sdks
        git clone --quiet --depth=1 https://github.com/theos/sdks.git $HOME/theos/sdks
        
    - name: Convert MP3 to C Header Array
      run: |
        if [ -f "silent.mp3" ]; then
          xxd -i silent.mp3 silent_data.h
          echo "[Success] 已成功将 silent.mp3 转换为内存数组 silent_data.h"
        else
          echo "[Error] 仓库根目录下未检测到 silent.mp3 文件，请先上传！"
          exit 1
        fi

    - name: Generate Flexible Filter Plist
      run: |
        cat <<EOF > BluedPushFix.plist
        {
            Filter = {
                Executables = (
                    "Blued极速版2",
                    "Blued",
                    "xiaolAn"
                );
            };
        }
        EOF
        echo "[Success] 成功创建自适应 Executables 过滤属性文件"
        
    - name: Compile Dylib via Theos
      run: |
        export THEOS=$HOME/theos
        make package FINALPACKAGE=1

    - name: Output Result Artifact
      uses: actions/upload-artifact@v4
      with:
        name: BluedPureMemoryPushFix
        path: .theos/obj/debug/BluedPushFix.dylib
